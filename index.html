<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<title>Cat lingo emoji</title>
<link rel="manifest" href="./manifest.json">
<link rel="stylesheet" href="./styles.css">
</head>
<body>

<div class="header">
  <h1 id="title">Cat lingo emoji</h1>
  <div class="coins" id="coins">🪙 0 <span id="text-monedes">Monedes</span></div>
</div>

<!-- TAB MAPA -->
<div id="menuPrincipal" class="tab-content active">
  <div id="mapa"></div>
</div>

<!-- TAB MISSIO -->
<div id="missionPanel" class="tab-content">
  <div id="missionContent"></div>
</div>

<!-- TAB GREMI -->
<div id="gremioPanel" class="tab-content">
  <div class="sub-tabs">
    <button class="sub-tab-btn" id="btnGremio" onclick="mostrarGremi('personatges', event)">Personatges</button>
    <button class="sub-tab-btn active" id="btnBiblioteca" onclick="mostrarBibliotecaTab('diccionari', event)">Biblioteca</button>
    <button class="sub-tab-btn" id="btnMinijocs" onclick="mostrarBibliotecaTab('minijocs', event)">Minijocs</button>
  </div>
  <div id="gremioContent"></div>
</div>

<!-- TAB LECTURA -->
<div id="lecturaPanel" class="tab-content">
  <div id="lecturaContent"></div>
</div>

<!-- TAB TIPS -->
<div id="tipsPanel" class="tab-content">
  <div id="tipsContent"></div>
</div>

<!-- TAB BOTIGA -->
<div id="botigaPanel" class="tab-content">
  <div class="capitol-grid" id="botigaContent"></div>
</div>

<!-- NAV BAR -->
<div class="nav">
  <div class="nav-item active" onclick="canviarTab('menuPrincipal', event)">
    <span class="nav-icon">🗺️</span>
    <span id="tab-mapa-txt">Món</span>
  </div>
  <div class="nav-item" onclick="canviarTab('missionPanel', event)">
    <span class="nav-icon">📜</span>
    <span id="tab-missio-txt">Missió</span>
  </div>
  <div class="nav-item" onclick="canviarTab('gremioPanel', event)">
    <span class="nav-icon">🏰</span>
    <span id="tab-gremi-txt">Gremi</span>
  </div>
  <div class="nav-item" onclick="canviarTab('lecturaPanel', event)">
    <span class="nav-icon">📖</span>
    <span id="tab-lectura-txt">Lectura</span>
  </div>
  <div class="nav-item" onclick="canviarTab('tipsPanel', event)">
    <span class="nav-icon">💡</span>
    <span id="tab-tips-txt">Tips</span>
  </div>
  <div class="nav-item" onclick="canviarTab('botigaPanel', event)">
    <span class="nav-icon">🛒</span>
    <span id="tab-botiga-txt">Botiga</span>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <p id="modalText"></p>
    <button class="btn" onclick="tancarModal()" style="margin-top:15px;">OK</button>
  </div>
</div>

<!-- SCRIPTS EN ORDRE -->
<script src="data/lectura-content.js"></script>
<script src="data/lectura-generator.js"></script>
<script src="data/tips-content.js"></script>
<script src="data/tips-generator.js"></script>
<script src="main.js"></script>

</body>
</html>
